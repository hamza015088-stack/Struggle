<!DOCTYPE html>
<html>
<head>
<title>Struggle</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  margin: 0;
  padding: 20px;
  transition: 0.3s;
}

.dark {
  background: #0f172a;
  color: white;
}

.light {
  background: #f1f5f9;
  color: black;
}

h1 {
  font-size: 40px;
  margin-bottom: 10px;
}

button {
  padding: 10px 15px;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  margin-top: 10px;
  font-weight: bold;
}

.primary {
  background: #3b82f6;
  color: white;
}

.danger {
  background: #ef4444;
  color: white;
}

.card {
  background: rgba(255,255,255,0.05);
  padding: 15px;
  border-radius: 16px;
  margin-top: 15px;
}

input {
  padding: 10px;
  width: 100%;
  border-radius: 12px;
  border: none;
  margin-top: 10px;
}

.progress {
  height: 8px;
  background: #334155;
  border-radius: 10px;
  margin-top: 10px;
}

.progress-bar {
  height: 8px;
  background: #22c55e;
  border-radius: 10px;
  width: 0%;
}
</style>
</head>

<body class="dark">

<h1>Struggle</h1>

<button onclick="toggleMode()" class="primary">Toggle Dark / Light Mode</button>

<div class="card">
<h2>Add Schedule</h2>
<input type="text" id="scheduleInput" placeholder="Enter schedule">
<button onclick="addSchedule()" class="primary">Add</button>
<div id="scheduleList"></div>
</div>

<div class="card">
<h2>Add Language</h2>
<input type="text" id="languageInput" placeholder="Enter language">
<button onclick="addLanguage()" class="primary">Add</button>
<div id="languageList"></div>
</div>

<script>
let schedules = JSON.parse(localStorage.getItem("schedules")) || [];
let languages = JSON.parse(localStorage.getItem("languages")) || [];

function saveData() {
  localStorage.setItem("schedules", JSON.stringify(schedules));
  localStorage.setItem("languages", JSON.stringify(languages));
}

function renderSchedules() {
  let list = document.getElementById("scheduleList");
  list.innerHTML = "";
  schedules.forEach((item, index) => {
    list.innerHTML += `
      <div class="card">
        ${item}
        <button class="danger" onclick="deleteSchedule(${index})">Delete</button>
      </div>
    `;
  });
}

function renderLanguages() {
  let list = document.getElementById("languageList");
  list.innerHTML = "";
  languages.forEach((item, index) => {
    list.innerHTML += `
      <div class="card">
        <strong>${item}</strong>
        <div class="progress">
          <div class="progress-bar" style="width: ${Math.floor(Math.random()*100)}%"></div>
        </div>
        <button class="danger" onclick="deleteLanguage(${index})">Delete</button>
      </div>
    `;
  });
}

function addSchedule() {
  let input = document.getElementById("scheduleInput");
  if(input.value.trim() !== "") {
    schedules.push(input.value);
    input.value = "";
    saveData();
    renderSchedules();
  }
}

function addLanguage() {
  let input = document.getElementById("languageInput");
  if(input.value.trim() !== "") {
    languages.push(input.value);
    input.value = "";
    saveData();
    renderLanguages();
  }
}

function deleteSchedule(index) {
  schedules.splice(index, 1);
  saveData();
  renderSchedules();
}

function deleteLanguage(index) {
  languages.splice(index, 1);
  saveData();
  renderLanguages();
}

function toggleMode() {
  let body = document.body;
  body.classList.toggle("dark");
  body.classList.toggle("light");
}

renderSchedules();
renderLanguages();
</script>

</body>
</html>
